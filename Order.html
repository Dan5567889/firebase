<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="OrderSend.js" defer></script>
    <title>Order Form</title>
</head>
<body>
        <h2>Place a Order</h2>
        <p id="userStatus">Checking login status...</p>
        <div class="form_container"> 
            <form id="orderform">
                <label for="item">Item:</label><br>
                <input type="text" id="item" name="item" required><br>
                <label for="quantity">Quantity:</label><br>
                <input type="number" id="quantity" name="quantity" required><br><br>
                <label for ="totalPrice">Total Price:</label><br>
                <input type="number" id="totalPrice" name="totalPrice" required><br><br>
                <button type="submit" value="Submit Order" id="submit" class="black_button">Place Order</button>

            </form>
            <br>
            <button id="logoutBtn" class="black_button">Logout</button>
        </div>
        <script type ="module" src="OrderSend.js" defer></script>
</body>
</html>
